<h2>{{ user.name }}</h2>

<p>ID: {{ user.id }}</p>

<form method="post" action="/action/kick">
    <input type="hidden" name="user_id" value="{{ user.id }}">
    <input type="hidden" name="guild_id" value="{{ guild_id }}">
    <button style="background:red;">Kicken</button>
</form>

<form method="post" action="/action/ban">
    <input type="hidden" name="user_id" value="{{ user.id }}">
    <input type="hidden" name="guild_id" value="{{ guild_id }}">
    <button style="background:black;">Bannen</button>
</form>
