<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login - Senko Panel</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .btn {
            background: #5865F2;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🔐 Login</h1>
    <p>Melde dich mit Discord an</p>

    <a class="btn" href="/login">Login mit Discord</a>
</div>

</body>
</html>
